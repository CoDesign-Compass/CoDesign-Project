services:
  db:
    image: postgres:16
    container_name: cdc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codesign}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - cdc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-codesign}"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama
    container_name: cdc_ollama
    restart: unless-stopped
    ports:
       - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama


  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cdc_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started  
    environment:
      SPRING_PROFILES_ACTIVE: docker

      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-codesign}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-60000}

      AI_SERVICE_PROVIDER: ${AI_SERVICE_PROVIDER:-gemini}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-gemini-2.5-flash}

      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}
    ports:
      - "${API_PORT:-8080}:8080"

  web:
    # Frontend build context and dockerfile location
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cdc_frontend
    restart: unless-stopped
    # Expose the frontend on port 3000 on the host
    ports:
      - "3000:80"
    # Ensure backend starts before frontend
    depends_on:
      - api

volumes:
  cdc_pgdata:
  ollama_data: