services:
  db:
    image: postgres:16
    container_name: cdc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codesign}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - cdc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-codesign}"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama
    container_name: cdc_ollama
    restart: unless-stopped
    ports:
       - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama


  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cdc_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started  
    environment:
      SPRING_PROFILES_ACTIVE: docker

      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-codesign}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-60000}

      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-true}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-compass@purposemediacbr.au}
    ports:
      - "${API_PORT:-8080}:8080"

  web:
    # Frontend build context and dockerfile location
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cdc_frontend
    restart: unless-stopped
    # Expose the frontend on port 3000 on the host
    ports:
      - "3000:80"
    # Ensure backend starts before frontend
    depends_on:
      - api

volumes:
  cdc_pgdata:
  ollama_data: