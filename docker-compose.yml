services:
  db:
    image: postgres:16
    container_name: cdc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codesign}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - cdc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-codesign}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cdc_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_DB: ${POSTGRES_DB:-codesign}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${API_PORT:-8080}:8080"

  ollama:
    image: ollama/ollama:latest
    container_name: cdc_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - cdc_ollama_data:/root/.ollama

  ollama-pull:
    image: curlimages/curl:latest
    container_name: cdc_ollama_pull
    depends_on:
      - ollama
    command: >
      sh -c "while ! curl -s http://ollama:11434/api/tags > /dev/null; do
        sleep 5;
      done;
      echo 'Ollama is up, pulling model llama3.2:3b...';
      curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3.2:3b\"}'"

  web:
    # Frontend build context and dockerfile location
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cdc_frontend
    restart: unless-stopped
    # Expose the frontend on port 3000 on the host
    ports:
      - "3000:80"
    # Ensure backend starts before frontend
    depends_on:
      - api

volumes:
  cdc_pgdata:
  cdc_ollama_data: