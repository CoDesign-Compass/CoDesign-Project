services:
  database:
    image: postgres:16
    container_name: codesign-postgres
    restart: always
    environment:
      POSTGRES_DB: codesign
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: codesign-backend
    restart: always
    depends_on:
      - database
    ports:
      - "8080:8080"
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: codesign
      DB_USER: postgres
      DB_PASSWORD: postgres

volumes:
  postgres_data: