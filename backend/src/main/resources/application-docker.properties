# In a Docker container, access the database using the service name db, not localhost.
spring.datasource.url=jdbc:postgresql://db:5432/${POSTGRES_DB:codesign}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}

ollama.base-url=${OLLAMA_BASE_URL:http://ollama:11434}
ollama.model=${OLLAMA_MODEL:llama3.1:8b}
ollama.timeout-ms=${OLLAMA_TIMEOUT_MS:60000}

spring.jpa.hibernate.ddl-auto=update
server.port=8080