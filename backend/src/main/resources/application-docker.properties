# In a Docker container, access the database using the service name db, not localhost.
spring.datasource.url=jdbc:postgresql://db:5432/${POSTGRES_DB:codesign}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}

ollama.base-url=${OLLAMA_BASE_URL:http://ollama:11434}
ollama.model=${OLLAMA_MODEL:llama3.2:3b}
ollama.timeout-ms=${OLLAMA_TIMEOUT_MS:60000}

ai.service.provider=${AI_SERVICE_PROVIDER:claude}

anthropic.api-key=${ANTHROPIC_API_KEY}
anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
anthropic.base-url=https://api.anthropic.com/v1/messages

google.api-key=${GOOGLE_API_KEY}
google.base-url=https://generativelanguage.googleapis.com/v1beta/models/
google.model=${GOOGLE_MODEL:gemini-2.5-flash}

spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:25}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}

app.mail.from=${APP_MAIL_FROM:no-reply@codesign.local}
app.mail.subject=${APP_MAIL_SUBJECT:Thank you for your response - Your voucher code}

server.port=${PORT:8080}
