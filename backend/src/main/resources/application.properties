spring.application.name=demo

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
admin.token=dev-admin-token

app.mail.from=${APP_MAIL_FROM:no-reply@codesign.local}
app.mail.subject=${APP_MAIL_SUBJECT:Thank you for your response - Your voucher code}
resend.api-key=${RESEND_API_KEY:}
app.public.base-url=${APP_PUBLIC_BASE_URL:https://co-design-project.vercel.app}

ollama.base-url=${OLLAMA_BASE_URL:http://ollama:11434}
ollama.model=${OLLAMA_MODEL:llama3.2:3b}
ollama.timeout-ms=${OLLAMA_TIMEOUT_MS:60000}

ai.service.provider=${AI_SERVICE_PROVIDER:openai}

anthropic.api-key=${ANTHROPIC_API_KEY}
anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
anthropic.base-url=https://api.anthropic.com/v1/messages

google.api-key=${GOOGLE_API_KEY}
google.base-url=https://generativelanguage.googleapis.com/v1beta/models/
google.model=${GOOGLE_MODEL:gemini-2.5-flash}

openai.api-key=${OPENAI_API_KEY}
openai.base-url=https://api.openai.com/v1/chat/completions
openai.model=${OPENAI_MODEL:gpt-4o}

app.admin.email=hello@purposemediacbr.au

server.port=${PORT:8080}
