spring.application.name=demo

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
admin.token=dev-admin-token

spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:25}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}

app.mail.from=${APP_MAIL_FROM:no-reply@codesign.local}
app.mail.subject=${APP_MAIL_SUBJECT:Thank you for your response - Your voucher code}

ollama.base-url=${OLLAMA_BASE_URL:http://ollama:11434}
ollama.model=${OLLAMA_MODEL:llama3.2:3b}
ollama.timeout-ms=${OLLAMA_TIMEOUT_MS:60000}

app.admin.email=hello@purposemedia.cbr.au

server.port=${PORT:8080}
