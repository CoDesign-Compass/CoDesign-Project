# Local development profile — connects to the DB container on localhost
spring.datasource.url=jdbc:postgresql://localhost:5432/codesign
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

ollama.base-url=http://localhost:11434
ollama.model=llama3.2:3b
ollama.timeout-ms=60000

ai.service.provider=${AI_SERVICE_PROVIDER:claude}

anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
anthropic.base-url=https://api.anthropic.com/v1/messages

google.api-key=${GOOGLE_API_KEY:}
google.base-url=https://generativelanguage.googleapis.com/v1beta/models/
google.model=${GOOGLE_MODEL:gemini-2.5-flash}

openai.api-key=${OPENAI_API_KEY:}
openai.base-url=https://api.openai.com/v1/chat/completions
openai.model=${OPENAI_MODEL:gpt-4o}

server.port=8080
